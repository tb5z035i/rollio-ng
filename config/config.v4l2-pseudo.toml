[episode]
format = "lerobot-v2.1"
fps = 30
chunk_size = 1000

[controller]
shutdown_timeout_ms = 3000
child_poll_interval_ms = 100

[visualizer]
port = 9090
max_preview_width = 320
max_preview_height = 240
jpeg_quality = 80
preview_fps = 30

[[devices]]
name = "camera_webcam"
type = "camera"
driver = "v4l2"
id = "/dev/video0"
width = 640
height = 480
fps = 30
pixel_format = "rgb24"
stream = "color"
transport = "usb"

[[devices]]
name = "leader_arm"
type = "robot"
driver = "pseudo"
id = "pseudo_robot_0"
dof = 6
mode = "free-drive"
control_frequency_hz = 60.0
transport = "simulated"
command_latency_ms = 20
state_noise_stddev = 0.01

[[devices]]
name = "follower_arm"
type = "robot"
driver = "pseudo"
id = "pseudo_robot_1"
dof = 6
mode = "command-following"
control_frequency_hz = 60.0
transport = "simulated"
command_latency_ms = 35
state_noise_stddev = 0.02

[[pairing]]
leader = "leader_arm"
follower = "follower_arm"
mapping = "direct-joint"

[encoder]
codec = "libx264"
queue_size = 32

[storage]
backend = "local"
output_path = "./output/v4l2-pseudo"

[monitor]
metrics_frequency_hz = 1.0

[monitor.thresholds."camera_webcam".actual_fps]
explanation = "Webcam FPS dropped below target"
lt = 28.0

[monitor.thresholds."encoder.camera_webcam".queue_depth]
explanation = "Encoder queue for webcam is nearly full"
gt = 80.0
