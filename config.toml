project_name = "default"
mode = "teleop"

[episode]
format = "lerobot-v2.1"
fps = 30
chunk_size = 1000

[[devices]]
name = "airbot_play_2"
executable = "rollio-device-airbot-play"
driver = "airbot-play"
id = "PZ25C02402000244"
bus_root = "airbot_play_2"
end_effector = "E2B"
interface = "can1"
transport = "can"

[[devices.channels]]
channel_type = "arm"
kind = "robot"
enabled = true
name = "airbot_play_arm_2"
channel_label = "AIRBOT Play"
mode = "free-drive"
dof = 6
publish_states = [
    "joint_position",
    "joint_velocity",
    "joint_effort",
    "end_effector_pose",
]
recorded_states = [
    "joint_position",
    "joint_velocity",
    "joint_effort",
    "end_effector_pose",
]
control_frequency_hz = 250.0

[devices.channels.command_defaults]
joint_mit_kp = []
joint_mit_kd = []
parallel_mit_kp = []
parallel_mit_kd = []

[[devices.channels]]
channel_type = "e2"
kind = "robot"
enabled = true
name = "airbot_e2"
channel_label = "AIRBOT E2"
mode = "free-drive"
dof = 1
publish_states = [
    "parallel_position",
    "parallel_velocity",
    "parallel_effort",
]
recorded_states = [
    "parallel_position",
    "parallel_velocity",
    "parallel_effort",
]
control_frequency_hz = 250.0

[devices.channels.command_defaults]
joint_mit_kp = []
joint_mit_kd = []
parallel_mit_kp = [0.0]
parallel_mit_kd = [0.0]

[[devices]]
name = "camera"
executable = "rollio-device-v4l2"
driver = "v4l2"
id = "/dev/video0"
bus_root = "camera"

[[devices.channels]]
channel_type = "color"
kind = "camera"
enabled = true
name = "camera"
channel_label = "V4L2 Camera"
publish_states = []
recorded_states = []

[devices.channels.profile]
width = 1280
height = 960
fps = 30
pixel_format = "rgb24"
native_pixel_format = "MJPG"

[devices.channels.command_defaults]
joint_mit_kp = []
joint_mit_kd = []
parallel_mit_kp = []
parallel_mit_kd = []

[[devices]]
name = "camera_2"
executable = "rollio-device-v4l2"
driver = "v4l2"
id = "/dev/video2"
bus_root = "camera_2"

[[devices.channels]]
channel_type = "color"
kind = "camera"
enabled = true
name = "camera_2"
channel_label = "V4L2 Camera"
publish_states = []
recorded_states = []

[devices.channels.profile]
width = 1280
height = 960
fps = 30
pixel_format = "rgb24"
native_pixel_format = "MJPG"

[devices.channels.command_defaults]
joint_mit_kp = []
joint_mit_kd = []
parallel_mit_kp = []
parallel_mit_kd = []

[[devices]]
name = "agx_nero"
executable = "rollio-device-agx-nero"
driver = "agx-nero"
id = "can2"
bus_root = "agx_nero"
interface = "can2"
transport = "can"

[[devices.channels]]
channel_type = "arm"
kind = "robot"
enabled = true
name = "agx_nero_arm"
channel_label = "AGX Nero"
mode = "command-following"
dof = 7
publish_states = [
    "joint_position",
    "joint_velocity",
    "joint_effort",
    "end_effector_pose",
]
recorded_states = [
    "joint_position",
    "joint_velocity",
    "joint_effort",
    "end_effector_pose",
]
control_frequency_hz = 250.0

[devices.channels.command_defaults]
joint_mit_kp = []
joint_mit_kd = []
parallel_mit_kp = []
parallel_mit_kd = []

[[devices.channels]]
channel_type = "gripper"
kind = "robot"
enabled = true
name = "agx_nero_gripper"
channel_label = "AGX Nero gripper"
mode = "command-following"
dof = 1
publish_states = [
    "parallel_position",
    "parallel_velocity",
    "parallel_effort",
]
recorded_states = [
    "parallel_position",
    "parallel_velocity",
    "parallel_effort",
]
control_frequency_hz = 250.0

[devices.channels.command_defaults]
joint_mit_kp = []
joint_mit_kd = []
parallel_mit_kp = [1.0]
parallel_mit_kd = [0.5]

[[pairings]]
leader_device = "airbot_play_2"
leader_channel_type = "e2"
follower_device = "agx_nero"
follower_channel_type = "gripper"
mapping = "parallel"
leader_state = "parallel_position"
follower_command = "parallel_mit"
joint_index_map = []
joint_scales = [1.7]

[[pairings]]
leader_device = "airbot_play_2"
leader_channel_type = "arm"
follower_device = "agx_nero"
follower_channel_type = "arm"
mapping = "cartesian"
leader_state = "end_effector_pose"
follower_command = "end_pose"
joint_index_map = []
joint_scales = []

[encoder]
video_codec = "h264"
depth_codec = "rvl"
backend = "auto"
video_backend = "auto"
depth_backend = "auto"
artifact_format = "auto"
queue_size = 32

[assembler]
missing_video_timeout_ms = 5000
staging_dir = "/dev/shm/rollio"
encoded_handoff = "file"

[storage]
backend = "local"
output_path = "./output"
queue_size = 32

[monitor]
metrics_frequency_hz = 1.0

[monitor.thresholds]

[controller]
shutdown_timeout_ms = 30000
child_poll_interval_ms = 100

[visualizer]
port = 19090
max_preview_width = 320
max_preview_height = 240
jpeg_quality = 30
preview_fps = 60

[ui]
http_host = "0.0.0.0"
http_port = 3000
start_key = "s"
stop_key = "e"
keep_key = "k"
discard_key = "x"
