project_name = "default"
mode = "teleop"
pairings = []

[episode]
format = "mcap"
fps = 30
chunk_size = 1000

[[devices]]
name = "camera"
executable = "rollio-device-v4l2"
driver = "v4l2"
id = "/dev/video0"
bus_root = "camera"

[[devices.channels]]
channel_type = "color"
kind = "camera"
enabled = true
name = "camera"
channel_label = "V4L2 Camera"
publish_states = []
recorded_states = []
preview_enabled = true
record_enabled = true

[devices.channels.profile]
width = 1920
height = 1080
fps = 30
pixel_format = "mjpeg"
native_pixel_format = "MJPG"

[devices.channels.record]
video_backend = "nvidia"
crf = 10

[devices.channels.preview_config]
crf = 30

[devices.channels.command_defaults]
joint_mit_kp = []
joint_mit_kd = []
parallel_mit_kp = []
parallel_mit_kd = []

[[devices]]
name = "camera_2"
executable = "rollio-device-v4l2"
driver = "v4l2"
id = "/dev/video2"
bus_root = "camera_2"

[[devices.channels]]
channel_type = "color"
kind = "camera"
enabled = true
name = "camera_2"
channel_label = "V4L2 Camera"
publish_states = []
recorded_states = []
preview_enabled = true
record_enabled = true

[devices.channels.profile]
width = 640
height = 480
fps = 60
pixel_format = "yuyv"
native_pixel_format = "YUYV"

[devices.channels.record]
video_backend = "nvidia"
crf = 5

[devices.channels.command_defaults]
joint_mit_kp = []
joint_mit_kd = []
parallel_mit_kp = []
parallel_mit_kd = []

[assembler]
missing_eos_timeout_ms = 30000
staging_dir = "/dev/shm/rollio"
staging_slots = 4

[storage]
backend = "local"
output_path = "./output"
queue_size = 32

[monitor]
metrics_frequency_hz = 1.0

[monitor.thresholds]

[controller]
shutdown_timeout_ms = 30000
child_poll_interval_ms = 100

[visualizer]
port = 19090

[ui]
http_host = "0.0.0.0"
http_port = 3000
start_key = "s"
stop_key = "e"
keep_key = "k"
discard_key = "x"
