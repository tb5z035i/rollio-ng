project_name = "default"
mode = "teleop"
pairings = []

[episode]
format = "lerobot-v2.1"
fps = 30
chunk_size = 1000

[[devices]]
name = "camera"
executable = "rollio-device-v4l2"
driver = "v4l2"
id = "/dev/video0"
bus_root = "camera"

[[devices.channels]]
channel_type = "color"
kind = "camera"
enabled = true
name = "camera"
channel_label = "V4L2 Camera"
publish_states = []
recorded_states = []

[devices.channels.profile]
width = 1920
height = 1080
fps = 30
pixel_format = "mjpeg"
native_pixel_format = "MJPG"

[devices.channels.command_defaults]
joint_mit_kp = []
joint_mit_kd = []
parallel_mit_kp = []
parallel_mit_kd = []

[encoder]
video_codec = "h264"
depth_codec = "rvl"
backend = "auto"
video_backend = "auto"
depth_backend = "auto"
artifact_format = "auto"
queue_size = 32

[encoder.preview]
output_mode = "encoded"
width = 320
height = 240
fps = 60

[assembler]
missing_video_timeout_ms = 5000
staging_dir = "/dev/shm/rollio"
encoded_handoff = "file"

[storage]
backend = "local"
output_path = "./output"
queue_size = 32

[monitor]
metrics_frequency_hz = 1.0

[monitor.thresholds]

[controller]
shutdown_timeout_ms = 30000
child_poll_interval_ms = 100

[visualizer]
port = 19090

[ui]
http_host = "0.0.0.0"
http_port = 3000
start_key = "s"
stop_key = "e"
keep_key = "k"
discard_key = "x"
