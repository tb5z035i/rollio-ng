[tool.ruff]
target-version = "py310"
line-length = 100
exclude = ["third_party", "external"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "RUF", # ruff-specific
]
ignore = [
    "E501", # line too long (handled by formatter)
]

[tool.ruff.lint.per-file-ignores]
"robots/nero/**/*.py" = [
    "N806", # SE3 / pinocchio-style names (R, M_l7_flange, …)
    "SIM105",
    "SIM108",
    "RUF002",
]

[tool.ruff.lint.isort]
known-first-party = ["rollio", "rollio_airbot_play"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
