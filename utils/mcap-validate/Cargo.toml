[package]
name = "mcap-validate"
version = "0.1.0"
edition = "2021"
description = "Validate MCAP files against per-station spec TOMLs (Rust port of validation.py with batch parallelism)"

[[bin]]
name = "mcap-validate"
path = "src/main.rs"

[lib]
name = "mcap_validate"
path = "src/lib.rs"
doctest = false

[dependencies]
mcap = "0.24"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = { version = "0.8", features = ["preserve_order"] }
indexmap = { version = "2", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
rayon = "1.10"
walkdir = "2"
flatbuffers = "24"
anyhow = "1"
thiserror = "1"
memmap2 = "0.9"
