repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^third_party/
      - id: end-of-file-fixer
        exclude: ^third_party/
      - id: check-yaml
        exclude: ^third_party/
      - id: check-toml
        exclude: ^third_party/
      - id: check-merge-conflict

  # Rust – format (auto-fix)
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        language: system
        entry: cargo fmt --all
        types: [rust]
        pass_filenames: false

  # Rust – lint
  - repo: local
    hooks:
      - id: cargo-clippy
        name: cargo clippy
        language: system
        entry: cargo clippy --workspace -- -D warnings
        types: [rust]
        pass_filenames: false

  # Rust – test
  - repo: local
    hooks:
      - id: cargo-test
        name: cargo test
        language: system
        entry: cargo test --workspace
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

  # C++ – format
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.7
    hooks:
      - id: clang-format
        files: ^cpp/
        types_or: [c, c++]
        args: [--style=file]

  # UI – build
  - repo: local
    hooks:
      - id: ui-build
        name: ui build
        language: system
        entry: bash -c 'cd ui && npm run build'
        files: ^ui/src/
        pass_filenames: false

  # Python – lint & format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        exclude: ^third_party/
      - id: ruff-format
        exclude: ^third_party/
