name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust – build, test, lint, format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install nightly rustfmt (rustfmt.toml ignore for third_party)
        run: rustup toolchain install nightly --profile minimal --component rustfmt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            patch \
            ninja-build \
            nasm \
            pkg-config \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            liburdfdom-dev \
            libeigen3-dev \
            libboost-filesystem-dev \
            libboost-serialization-dev

      - name: Patch vendored Pinocchio (airbot_play_rust static link)
        run: make apply-airbot-pinocchio-patch

      - name: cargo fmt (check)
        run: cargo +nightly fmt --all -- --check

      - name: cargo build (workspace)
        run: |
          export AIRBOT_PINOCCHIO_BUILD_JOBS="${AIRBOT_PINOCCHIO_BUILD_JOBS:-$(nproc)}"
          cargo build --workspace -j "${AIRBOT_PINOCCHIO_BUILD_JOBS}"

      - name: cargo test (workspace)
        run: |
          export AIRBOT_PINOCCHIO_BUILD_JOBS="${AIRBOT_PINOCCHIO_BUILD_JOBS:-$(nproc)}"
          cargo test --workspace -j "${AIRBOT_PINOCCHIO_BUILD_JOBS}"

      - name: cargo clippy (workspace)
        run: |
          export AIRBOT_PINOCCHIO_BUILD_JOBS="${AIRBOT_PINOCCHIO_BUILD_JOBS:-$(nproc)}"
          cargo clippy --workspace -j "${AIRBOT_PINOCCHIO_BUILD_JOBS}" -- -D warnings

  cpp:
    name: C++ – build, format, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: clang-format check
        run: |
          find cameras cpp/common \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \) \
            | xargs clang-format --dry-run --Werror --style=file

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libusb-1.0-0-dev \
            libudev-dev

      - name: cmake configure
        run: cmake -B cameras/build -S cameras -DCMAKE_CXX_COMPILER=g++

      - name: cmake build
        run: cmake --build cameras/build

      - name: ctest
        run: ctest --test-dir cameras/build --output-on-failure

  ui:
    name: UI – build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nasm

      - name: npm ci
        working-directory: ui/terminal
        run: npm ci

      - name: npm test
        working-directory: ui/terminal
        run: npm test

      - name: npm run build
        working-directory: ui/terminal
        run: npm run build

  python:
    name: Python – lint, format, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python tooling
        run: pip install pytest ruff

      - name: ruff check
        run: ruff check .

      - name: ruff format (check)
        run: ruff format --check .

      - name: pytest
        run: PYTHONPATH="$GITHUB_WORKSPACE/robots/airbot_play/src" python -m pytest robots/airbot_play/tests

  package:
    name: Package – deb + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install packaging / build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            patch \
            build-essential \
            dpkg-dev \
            file \
            cmake \
            ninja-build \
            pkg-config \
            nasm \
            clang \
            libclang-dev \
            llvm-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            liburdfdom-dev \
            libconsole-bridge-dev \
            libeigen3-dev \
            libboost-filesystem-dev \
            libboost-serialization-dev \
            libusb-1.0-0-dev \
            libudev-dev \
            g++ \
            git

      - name: Build release artifacts and pack
        env:
          DEB_VERSION: 1.0.0~ci${{ github.run_number }}
        run: make package-all

      - name: Upload deb and wheel
        uses: actions/upload-artifact@v4
        with:
          name: rollio-packages
          path: |
            dist/*.deb
            dist/*.whl
          if-no-files-found: error
