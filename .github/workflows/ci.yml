name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Three jobs that map directly onto the Makefile surface:
#
#   check          -> make deps && make lint && make test         (amd64, default debug)
#   package        -> make deps && make build BUILD_TYPE=release
#                     && make package BUILD_TYPE=release           (amd64, deb + Nero wheel)
#   package-arm64  -> ditto with TARGET_ARCH=arm64                 (cross deb only)
#
# Intentionally fewer/larger jobs than before -- sequential is fine at our
# scale, and routing through `make` keeps CI in lockstep with what
# developers run locally.

jobs:
  check:
    name: Lint & test (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      # `make rust-lint` (fmt --check) honors the unstable `ignore`
      # directive in rustfmt.toml, so nightly rustfmt must be on PATH.
      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --profile minimal --component rustfmt

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python tooling
        run: pip install pytest ruff

      - name: Install host build dependencies
        run: make deps

      - name: Lint (rust + c++ + ui + python)
        run: make lint

      - name: Test (rust + c++ + ui + python)
        run: make test

  package:
    name: Package – amd64 (deb + wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install host build dependencies
        run: make deps

      - name: Build (release)
        env:
          DEB_VERSION: 1.0.0~ci${{ github.run_number }}
        run: make build BUILD_TYPE=release

      - name: Pack
        env:
          DEB_VERSION: 1.0.0~ci${{ github.run_number }}
        run: make package BUILD_TYPE=release

      - name: Upload deb and wheel
        uses: actions/upload-artifact@v4
        with:
          name: rollio-packages
          path: |
            dist/*.deb
            dist/*.whl
          if-no-files-found: error

  package-arm64:
    name: Package – arm64 (cross deb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: arm64

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install cross toolchain and arm64 dev libs
        run: make deps TARGET_ARCH=arm64

      - name: Build (release, arm64 cross)
        env:
          DEB_VERSION: 1.0.0~ci${{ github.run_number }}
          AIRBOT_PINOCCHIO_BUILD_JOBS: 4
        run: make build BUILD_TYPE=release TARGET_ARCH=arm64

      - name: Pack
        env:
          DEB_VERSION: 1.0.0~ci${{ github.run_number }}
        run: make package BUILD_TYPE=release TARGET_ARCH=arm64

      - name: Upload arm64 deb
        uses: actions/upload-artifact@v4
        with:
          name: rollio-packages-arm64
          path: dist/rollio_*_arm64.deb
          if-no-files-found: error
