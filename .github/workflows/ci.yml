name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust – build, test, lint, format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: cargo fmt (check)
        run: cargo fmt --all -- --check

      - name: cargo build (workspace)
        run: cargo build --workspace

      - name: cargo test (workspace)
        run: cargo test --workspace

      - name: cargo clippy (workspace)
        run: cargo clippy --workspace -- -D warnings

  cpp:
    name: C++ – build, format, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: clang-format check
        run: |
          find cameras cpp/common \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \) \
            | xargs clang-format --dry-run --Werror --style=file

      - name: cmake configure
        run: cmake -B cameras/build -S cameras -DCMAKE_CXX_COMPILER=g++

      - name: cmake build
        run: cmake --build cameras/build

      - name: ctest
        run: ctest --test-dir cameras/build --output-on-failure

  ui:
    name: UI – build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: npm ci
        working-directory: ui/terminal
        run: npm ci

      - name: npm test
        working-directory: ui/terminal
        run: npm test

      - name: npm run build
        working-directory: ui/terminal
        run: npm run build

  python:
    name: Python – lint, format, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python tooling
        run: pip install pytest ruff

      - name: ruff check
        run: ruff check --exclude third_party .

      - name: ruff format (check)
        run: ruff format --check --exclude third_party .

      - name: pytest
        run: PYTHONPATH="$GITHUB_WORKSPACE/robots/airbot_play/src" python -m pytest robots/airbot_play/tests
